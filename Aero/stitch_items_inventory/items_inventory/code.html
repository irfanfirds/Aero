<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aero Manifesto - Items Inventory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF", // Vibrant Cyan
                        secondary: "#FFD600", // Vibrant Yellow
                        accent: "#FF2A6D", // Vibrant Red/Pink
                        "background-light": "#FFFFFF",
                        "background-dark": "#18181b",
                        "surface-light": "#F3F4F6",
                        "surface-dark": "#27272a",
                    },
                    fontFamily: {
                        display: ["Varela Round", "sans-serif"],
                        body: ["Varela Round", "sans-serif"],
                    },
                    boxShadow: {
                        'neo': '5px 5px 0px 0px rgba(0,0,0,1)',
                        'neo-sm': '3px 3px 0px 0px rgba(0,0,0,1)',
                        'neo-dark': '5px 5px 0px 0px rgba(255,255,255,1)',
                        'neo-sm-dark': '3px 3px 0px 0px rgba(255,255,255,1)',
                    },
                    borderWidth: {
                        '3': '3px',
                    }
                },
            },
        };
    </script>
<style>
        .neo-border {
            border: 3px solid black;
        }
        .dark .neo-border {
            border-color: white;
        }
        .neo-shadow {
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,1);
        }
        .dark .neo-shadow {
            box-shadow: 5px 5px 0px 0px rgba(255,255,255,1);
        }
        .neo-shadow-sm {
            box-shadow: 3px 3px 0px 0px rgba(0,0,0,1);
        }
        .dark .neo-shadow-sm {
            box-shadow: 3px 3px 0px 0px rgba(255,255,255,1);
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-pulse-slow {
            animation: pulse-ring 3s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }.no-scrollbar {
            -ms-overflow-style: none;scrollbar-width: none;}
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 dark:bg-black font-display antialiased transition-colors duration-300">
<div class="max-w-md mx-auto min-h-screen bg-background-light dark:bg-background-dark relative overflow-hidden flex flex-col">
<div class="flex justify-between items-center px-6 py-3 text-black dark:text-white text-sm font-bold z-10">
<span>9:41</span>
<div class="flex items-center gap-2">
<span class="material-icons-round text-base">signal_cellular_alt</span>
<span class="material-icons-round text-base">wifi</span>
<span class="material-icons-round text-base">battery_full</span>
</div>
</div>
<header class="px-6 py-4 flex justify-between items-center z-10">
<div>
<h1 class="text-4xl font-bold text-black dark:text-white uppercase leading-none tracking-tight">Items<br/>Inventory</h1>
</div>
<button class="w-12 h-12 rounded-full bg-secondary neo-border neo-shadow flex items-center justify-center active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all">

</button>

</div>

</div>
</div>
</section>
<section class="px-6 pb-6 overflow-x-auto no-scrollbar">

</button>

<div class="w-full mt-2">

<span class="text-xs font-bold uppercase">Beta</span>
<span class="material-icons-round text-xs">adjust</span>
</div>
</div>

<div class="w-16 h-16 bg-red-100 dark:bg-red-900 rounded-2xl border-3 border-black dark:border-white flex items-center justify-center mt-2 group-hover:rotate-6 transition-transform">

</div>

<span class="material-icons-round text-xs">star</span>

</div>
<div class="w-full mt-2">

<span class="material-icons-round text-xs">adjust</span>
</div>
</div>
</div>
</div>
</main>
<div class="absolute bottom-6 left-0 right-0 z-30 flex justify-center items-end pointer-events-none">
<div class="flex items-center gap-6 pointer-events-auto">
<button class="w-14 h-14 bg-white dark:bg-surface-dark rounded-full neo-border neo-shadow flex items-center justify-center active:translate-y-[2px] active:shadow-none transition-all group hover:bg-surface-light dark:hover:bg-gray-800">
<span class="material-icons-round text-black dark:text-white text-2xl group-hover:scale-110 transition-transform">home</span>
</button>
<button class="w-20 h-20 bg-secondary rounded-full neo-border neo-shadow flex items-center justify-center active:translate-y-[2px] active:shadow-none transition-all hover:scale-105">

</div>
</div>
