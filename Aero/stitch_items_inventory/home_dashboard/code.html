<script>

            darkMode: "class",

                extend: {
                    colors: {
                        primary: "#D4FF38", // The bright lime green/yellow from reference

                        accent: "#FF4D4D", // Red for waste alert
                        cyan: "#4DFAFF", // Neo-brutalist cyan
                        "background-light": "#FFFFFF",
                        "background-dark": "#121212",
                        "surface-dark": "#1E1E1E",
                    },
                    fontFamily: {
                        display: ["Varela Round", "sans-serif"],

                    borderRadius: {
                        DEFAULT: "1.5rem", 
                        'xl': "1.5rem",
                        '2xl': "2rem",

                    borderWidth: {
                        '3': '3px',
                    },
                    boxShadow: {
                        'hard': '5px 5px 0px 0px rgba(0,0,0,1)', // Hard shadow for neo-brutalism
