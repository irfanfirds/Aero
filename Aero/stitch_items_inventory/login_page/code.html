<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aero Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00FFFF","accent-yellow": "#FFEB3B","accent-red": "#FF4444","background-light": "#ffffff","background-dark": "#102222",
                        "border-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Outfit", "sans-serif"]
                    },
                    borderWidth: {
                        '3': '3px',
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px"},
                    boxShadow: {
                        'neo': '5px 5px 0px 0px #000000',
                        'neo-sm': '3px 3px 0px 0px #000000',
                        'neo-hover': '2px 2px 0px 0px #000000',
                    }
                },
            },
        }
    </script>
<style>
        .neo-input {
            transition: all 0.2s ease;
        }
        .neo-input:focus {
            box-shadow: 5px 5px 0px 0px #000000;
            transform: translate(-2px, -2px);
            outline: none;
        }
        body {
             min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-black overflow-x-hidden min-h-screen flex flex-col">
<div class="flex-1 flex flex-col justify-center items-center p-6 w-full max-w-md mx-auto relative z-10">
<div class="w-full mb-10 text-center">
<h1 class="text-black tracking-tighter text-7xl font-black mb-2" style="letter-spacing: -0.05em;">
                Aero
            </h1>
<p class="text-black font-bold text-lg leading-tight bg-accent-yellow inline-block px-2 border-2 border-black shadow-neo-sm transform -rotate-1">
                Log in to track your impact.
            </p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-black text-lg font-black uppercase tracking-wide" for="email">
                    Email Address
                </label>
<div class="relative group">
<input class="neo-input block w-full h-16 rounded-xl bg-white border-3 border-black text-black placeholder:text-gray-400 focus:border-black focus:ring-0 p-4 pl-5 text-xl font-bold" id="email" placeholder="user@example.com" type="email"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-black">
<span class="material-symbols-outlined" style="font-size: 28px;">mail</span>
</div>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-black text-lg font-black uppercase tracking-wide" for="password">
                        Password
                    </label>
</div>
<div class="relative group">
<input class="neo-input block w-full h-16 rounded-xl bg-white border-3 border-black text-black placeholder:text-gray-400 focus:border-black focus:ring-0 p-4 pl-5 text-xl font-bold" id="password" placeholder="••••••••" type="password"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-black">
<span class="material-symbols-outlined" style="font-size: 28px;">lock</span>
</div>
</div>
</div>
<div class="pt-6">
<button class="group relative w-full flex items-center justify-center" type="button">
<div class="absolute inset-0 bg-black rounded-xl translate-x-[5px] translate-y-[5px] group-active:translate-x-0 group-active:translate-y-0 transition-transform"></div>
<div class="relative w-full bg-primary border-3 border-black rounded-xl h-16 flex items-center justify-center cursor-pointer group-active:translate-x-[5px] group-active:translate-y-[5px] transition-transform hover:-translate-y-1 hover:-translate-x-1 duration-200">
<span class="text-black text-2xl font-black tracking-tight uppercase flex items-center gap-2">
                            Login <span class="material-symbols-outlined font-black" style="font-size: 32px; stroke-width: 4px;">arrow_forward</span>
</span>
</div>
</button>
</div>
</form>
<div class="mt-10 flex flex-col items-center gap-6 w-full">
<a class="text-black font-bold text-lg hover:bg-accent-red hover:text-white px-2 py-1 transition-colors border-2 border-transparent hover:border-black hover:shadow-neo-sm rounded-md" href="#">
                Forgot Password?
            </a>
<div class="relative flex py-2 items-center w-full">
<div class="flex-grow border-t-4 border-black"></div>
<span class="flex-shrink-0 mx-4 text-black text-base font-black uppercase bg-white px-2 border-2 border-black rounded shadow-neo-sm">Or</span>
<div class="flex-grow border-t-4 border-black"></div>
</div>
<div class="flex gap-4 w-full">
<button class="flex-1 h-14 flex items-center justify-center bg-white border-3 border-black rounded-xl shadow-neo hover:shadow-neo-hover hover:translate-x-[2px] hover:translate-y-[2px] transition-all active:translate-x-[5px] active:translate-y-[5px] active:shadow-none">
<span class="material-symbols-outlined" style="font-size: 32px;">phone_iphone</span>
</button>
<button class="flex-1 h-14 flex items-center justify-center bg-white border-3 border-black rounded-xl shadow-neo hover:shadow-neo-hover hover:translate-x-[2px] hover:translate-y-[2px] transition-all active:translate-x-[5px] active:translate-y-[5px] active:shadow-none">
<span class="material-symbols-outlined" style="font-size: 32px;">public</span>
</button>
</div>
<p class="mt-4 text-base font-bold text-black">
                Don't have an account? 
                <a class="text-black font-black underline decoration-primary decoration-4 underline-offset-4 hover:bg-primary px-1 transition-all border-2 border-transparent hover:border-black hover:shadow-neo-sm hover:no-underline rounded-md" href="#">
                    Create Account
                </a>
</p>
</div>
</div>
<div class="fixed inset-0 z-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#000 1.5px, transparent 1.5px); background-size: 24px 24px;">
</div>

</body></html>
